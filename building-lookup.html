<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>건물 유형 판별기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0F172A 0%, #1E293B 60%, #0F172A 100%);
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      padding: 24px 16px 60px;
      color: #F1F5F9;
    }

    .wrap { max-width: 580px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 24px; }
    .header-icon { font-size: 44px; margin-bottom: 6px; }
    .header h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.5px; }
    .header p { color: #64748B; font-size: 13px; }
    .api-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
      border-radius: 20px; padding: 4px 12px; margin-top: 8px;
    }
    .api-dot { width: 6px; height: 6px; border-radius: 50%; background: #22C55E; display: inline-block; }
    .api-badge span { color: #22C55E; font-size: 11px; font-weight: 600; }

    .card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 20px;
      margin-bottom: 16px;
    }

    .input-label { color: #94A3B8; font-size: 12px; font-weight: 600; display: block; margin-bottom: 8px; letter-spacing: 0.5px; }
    textarea {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; padding: 12px 14px;
      color: #F1F5F9; font-size: 15px; resize: none; outline: none;
      line-height: 1.5; font-family: inherit;
    }
    textarea::placeholder { color: #334155; }
    textarea:focus { border-color: rgba(99,102,241,0.5); }

    .search-btn {
      width: 100%; margin-top: 10px; padding: 14px;
      background: linear-gradient(135deg, #3B82F6, #6366F1);
      border: none; border-radius: 12px; color: #fff;
      font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: opacity 0.2s;
    }
    .search-btn:disabled { opacity: 0.4; cursor: not-allowed; background: #1E293B; }

    .error-msg { color: #F87171; font-size: 13px; margin-top: 6px; min-height: 18px; }

    .progress-wrap { margin-top: 12px; display: none; }
    .progress-bar { display: flex; gap: 8px; }
    .progress-step { flex: 1; height: 4px; border-radius: 2px; transition: background 0.3s; }
    .progress-text { color: #64748B; font-size: 11px; text-align: center; margin-top: 6px; }

    .examples-label { color: #475569; font-size: 11px; margin: 14px 0 6px; }
    .examples-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
    .example-btn {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px; padding: 4px 8px; color: #64748B;
      font-size: 10px; cursor: pointer; font-family: inherit;
    }
    .example-btn:hover { background: rgba(255,255,255,0.1); color: #94A3B8; }

    .candidates-title { color: #94A3B8; font-size: 13px; margin-bottom: 12px; line-height: 1.6; }
    .candidate-btn {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 12px 14px;
      text-align: left; cursor: pointer; margin-bottom: 8px;
      display: flex; flex-direction: column; gap: 3px;
      font-family: inherit; transition: background 0.2s;
    }
    .candidate-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(99,102,241,0.4); }
    .candidate-name { color: #F1F5F9; font-size: 14px; font-weight: 700; }
    .candidate-road { color: #94A3B8; font-size: 13px; }
    .candidate-jibun { color: #475569; font-size: 11px; }
    .back-btn {
      background: none; border: none; color: #475569; font-size: 12px;
      cursor: pointer; margin-top: 4px; font-family: inherit; padding: 4px 0;
    }
    .back-btn:hover { color: #94A3B8; }

    .result-card { border-radius: 20px; border: 2px solid transparent; padding: 20px; margin-bottom: 16px; }
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .source-badge {
      display: inline-flex; align-items: center; gap: 5px;
      border-radius: 12px; padding: 3px 10px; font-size: 11px; font-weight: 700;
      background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.4); color: #15803D;
    }
    .result-main { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .result-label { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .result-type { font-size: 28px; font-weight: 900; }
    .result-bldnm { color: #6B7280; font-size: 13px; margin-top: 2px; }

    .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .detail-item { background: rgba(0,0,0,0.08); border-radius: 10px; padding: 10px 12px; }
    .detail-label { color: #9CA3AF; font-size: 10px; font-weight: 600; margin-bottom: 3px; }
    .detail-value { color: #374151; font-size: 14px; font-weight: 700; line-height: 1.3; }

    .addr-info { border-top: 1px solid rgba(0,0,0,0.1); padding-top: 10px; margin-top: 4px; }
    .addr-road { color: #6B7280; font-size: 12px; margin-bottom: 3px; }
    .addr-jibun { color: #9CA3AF; font-size: 11px; }

    .no-data-card {
      text-align: center; padding: 32px 20px;
      background: rgba(255,255,255,0.04);
      border-radius: 20px; border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 16px;
    }

    .history-label { color: #475569; font-size: 11px; margin-bottom: 8px; }
    .history-item {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 10px 14px; cursor: pointer;
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
      transition: background 0.2s;
    }
    .history-item:hover { background: rgba(255,255,255,0.06); }
    .history-addr { flex: 1; color: #64748B; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-type { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; white-space: nowrap; }
  </style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-icon">🏘️</div>
    <h1>건물 유형 판별기</h1>
    <p>국토교통부 건축물대장 공식 데이터 연동</p>
    <div class="api-badge">
      <span class="api-dot"></span>
      <span>도로명 · 지번 주소 모두 지원</span>
    </div>
  </div>

  <div class="card">
    <label class="input-label">주소 입력 (도로명 또는 지번, 둘 다 OK)</label>
    <textarea id="addressInput" rows="2"
      placeholder="예) 서울 강남구 테헤란로 521&#10;또는 서울 강남구 대치동 176-1"></textarea>
    <div id="errorMsg" class="error-msg"></div>
    <button class="search-btn" id="searchBtn" onclick="handleSearch()">🔍 건물 정보 조회</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar">
        <div class="progress-step" id="step1" style="background:rgba(59,130,246,0.3)"></div>
        <div class="progress-step" id="step2" style="background:rgba(99,102,241,0.3)"></div>
      </div>
      <p class="progress-text" id="progressText"></p>
    </div>

    <div>
      <p class="examples-label">예시 주소</p>
      <div class="examples-wrap" id="examplesWrap"></div>
    </div>
  </div>

  <div class="card" id="candidatesCard" style="display:none">
    <p class="candidates-title" id="candidatesTitle"></p>
    <div id="candidatesList"></div>
    <button class="back-btn" onclick="resetDisplay()">← 다시 입력</button>
  </div>

  <div id="resultWrap"></div>

  <div id="historySection" style="display:none">
    <p class="history-label">최근 검색</p>
    <div id="historyList"></div>
  </div>

</div>

<script>
  const JUSO_KEY = "U01TX0FVVEgyMDI2MDYyNTIyNDE0NTExOTUxMDE=";
  const BLD_KEY  = "ad95d7c3bb1ef219eb1449781d7025df1c65b7334b07ecde5fcf1076dcc2deb0";
  const JUSO_API = "https://business.juso.go.kr/addrlink/addrLinkApi.do";
  const BLD_API  = "https://apis.data.go.kr/1613000/BldRgstHubService/getBrBasisOulnInfo";

  const EXAMPLES = [
    "서울 강남구 테헤란로 521",
    "서울 서초구 반포대로 201",
    "서울 강남구 대치동 176-1",
    "부산 해운대구 우동 1408",
    "경기 성남시 분당구 정자동 15-1",
  ];

  const TYPE_CFG = {
    "아파트":   { icon: "🏢", bg: "#EFF6FF", text: "#1D4ED8", border: "#BFDBFE" },
    "연립":     { icon: "🏘️", bg: "#F0FDF4", text: "#15803D", border: "#BBF7D0" },
    "다세대":   { icon: "🏘️", bg: "#F0FDF4", text: "#15803D", border: "#BBF7D0" },
    "단독":     { icon: "🏠", bg: "#FFF7ED", text: "#C2410C", border: "#FED7AA" },
    "다가구":   { icon: "🏚️", bg: "#FFFBEB", text: "#854D0E", border: "#FEF08A" },
    "오피스텔": { icon: "🏙️", bg: "#FAF5FF", text: "#7E22CE", border: "#E9D5FF" },
    "default":  { icon: "🏗️", bg: "#F9FAFB", text: "#374151", border: "#E5E7EB" },
  };

  let searchHistory = [];

  function getCfg(name) {
    if (!name) return TYPE_CFG.default;
    for (const k of Object.keys(TYPE_CFG)) {
      if (k !== "default" && name.includes(k)) return TYPE_CFG[k];
    }
    return TYPE_CFG.default;
  }

  function fmt(n) { return (n != null && n !== "") ? Number(n).toLocaleString() : "-"; }

  function fmtDate(d) {
    if (!d) return "-";
    const s = String(d).replace(/\D/g, "");
    if (s.length >= 8) return `${s.slice(0,4)}.${s.slice(4,6)}.${s.slice(6,8)}`;
    return s;
  }

  (function init() {
    const wrap = document.getElementById("examplesWrap");
    EXAMPLES.forEach(ex => {
      const btn = document.createElement("button");
      btn.className = "example-btn";
      btn.textContent = ex.length > 22 ? ex.slice(0, 22) + "…" : ex;
      btn.onclick = () => { document.getElementById("addressInput").value = ex; resetDisplay(); };
      wrap.appendChild(btn);
    });
    document.getElementById("addressInput").addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSearch(); }
    });
  })();

  function resetDisplay() {
    document.getElementById("resultWrap").innerHTML = "";
    document.getElementById("candidatesCard").style.display = "none";
    document.getElementById("errorMsg").textContent = "";
    setProgress(false);
  }

  function setBtn(disabled) { document.getElementById("searchBtn").disabled = disabled; }

  function setProgress(stepNum, text) {
    const wrap = document.getElementById("progressWrap");
    if (!stepNum) { wrap.style.display = "none"; return; }
    wrap.style.display = "block";
    document.getElementById("step1").style.background = stepNum >= 1 ? "#3B82F6" : "rgba(59,130,246,0.3)";
    document.getElementById("step2").style.background = stepNum >= 2 ? "#6366F1" : "rgba(99,102,241,0.3)";
    document.getElementById("progressText").textContent = text || "";
  }

  function showError(msg) { document.getElementById("errorMsg").textContent = msg; setProgress(false); }

  async function handleSearch() {
    const address = document.getElementById("addressInput").value.trim();
    if (!address) return;
    resetDisplay();
    setBtn(true);
    setProgress(1, "1/2 주소 검색 중...");
    try {
      const list = await searchJuso(address);
      if (!list.length) { showError("주소를 찾을 수 없습니다. 더 구체적으로 입력해주세요."); return; }
      if (list.length === 1) { await loadBuilding(list[0]); }
      else { showCandidates(list); }
    } catch (e) {
      showError("주소 검색 오류: " + e.message);
    } finally {
      setBtn(false);
      setProgress(false);
    }
  }

  async function searchJuso(keyword) {
    const p = new URLSearchParams({ confmKey: JUSO_KEY, currentPage: "1", countPerPage: "10", keyword, resultType: "json" });
    const res = await fetch(`${JUSO_API}?${p}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const common = data?.results?.common;
    if (common?.errorCode !== "0") throw new Error(common?.errorMessage || "주소 검색 오류");
    return data?.results?.juso || [];
  }

  function showCandidates(list) {
    setProgress(false);
    document.getElementById("candidatesTitle").textContent = `📍 ${list.length}개 주소가 검색됐습니다. 해당 건물을 선택하세요`;
    const ul = document.getElementById("candidatesList");
    ul.innerHTML = "";
    list.forEach(j => {
      const btn = document.createElement("button");
      btn.className = "candidate-btn";
      btn.innerHTML = `
        ${j.bdNm ? `<span class="candidate-name">🏢 ${j.bdNm}</span>` : ""}
        <span class="candidate-road">${j.roadAddr}</span>
        <span class="candidate-jibun">지번: ${j.jibunAddr}</span>
      `;
      btn.onclick = async () => {
        document.getElementById("candidatesCard").style.display = "none";
        setBtn(true);
        setProgress(2, "2/2 건축물대장 조회 중...");
        try { await loadBuilding(j); } finally { setBtn(false); setProgress(false); }
      };
      ul.appendChild(btn);
    });
    document.getElementById("candidatesCard").style.display = "block";
  }

  async function loadBuilding(juso) {
    setProgress(2, "2/2 건축물대장 조회 중...");
    const params = extractParams(juso);
    let bld = null;
    try { bld = await fetchBld(params); } catch (_) {}
    renderResult(bld, params);
    const addr = document.getElementById("addressInput").value.trim();
    searchHistory = [{ addr, bld, params }, ...searchHistory.slice(0, 4)];
    renderHistory();
  }

  function extractParams(juso) {
    const bd = juso.bdMgtSn || "";
    return {
      siDo:      bd.slice(0, 2),
      siGunGu:   bd.slice(2, 5),
      platGbCd:  juso.mtYn || "0",
      bun:       String(parseInt(juso.lnbrMnnm || "0") || ""),
      ji:        String(parseInt(juso.lnbrSlno || "0") || "0"),
      bdNm:      juso.bdNm || "",
      roadAddr:  juso.roadAddr || "",
      jibunAddr: juso.jibunAddr || "",
    };
  }

  async function fetchBld(params) {
    const p = new URLSearchParams({
      serviceKey: BLD_KEY,
      siDo:       params.siDo,
      siGunGu:    params.siGunGu,
      platGbCd:   params.platGbCd,
      startPage:  "1",
      numOfRows:  "10",
      _type:      "json",
    });
    if (params.bun && params.bun !== "0") p.append("bun", params.bun);
    if (params.ji && params.ji !== "0")  p.append("ji", params.ji);

    const targetUrl = `${BLD_API}?${p}`;
    let data;

    try {
      // 직접 요청 시도
      const res = await fetch(targetUrl);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      data = await res.json();
    } catch (_) {
      // CORS 차단 시 프록시로 우회
      const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
      const res = await fetch(proxyUrl);
      if (!res.ok) throw new Error(`Proxy HTTP ${res.status}`);
      data = await res.json();
    }

    const items = data?.response?.body?.items?.item;
    if (!items) return null;
    return Array.isArray(items) ? items[0] : items;
  }

  function renderResult(bld, params) {
    const wrap = document.getElementById("resultWrap");

    if (!bld) {
      wrap.innerHTML = `
        <div class="no-data-card">
          <div style="font-size:40px;margin-bottom:12px">🔍</div>
          <p style="color:#94A3B8;font-size:15px;font-weight:600;margin-bottom:6px">건축물대장 데이터 없음</p>
          <p style="color:#475569;font-size:12px;line-height:1.8">번지 정보가 정확하지 않거나 미등재 건물일 수 있습니다</p>
          <div style="margin-top:12px;background:rgba(255,255,255,0.04);border-radius:10px;padding:12px;text-align:left">
            <p style="color:#64748B;font-size:11px;margin-bottom:3px">🏙️ ${params.roadAddr}</p>
            <p style="color:#475569;font-size:11px">📍 ${params.jibunAddr}</p>
          </div>
          <details style="margin-top:10px;text-align:left">
            <summary style="color:#475569;font-size:11px;cursor:pointer;user-select:none">🔧 전송된 파라미터 확인</summary>
            <div style="background:rgba(0,0,0,0.3);border-radius:8px;padding:10px;margin-top:6px;font-family:monospace;font-size:11px;color:#94A3B8;line-height:1.8">
              <div>시도코드: <b style="color:#F1F5F9">${params.siDo}</b> | 시군구코드: <b style="color:#F1F5F9">${params.siGunGu}</b></div>
              <div>대지구분: <b style="color:#F1F5F9">${params.platGbCd === "1" ? "산" : "대지"}</b> | 번: <b style="color:#F1F5F9">${params.bun}</b> | 지: <b style="color:#F1F5F9">${params.ji}</b></div>
            </div>
          </details>
        </div>
      `;
      return;
    }

    const typeName = bld.mainPurpsCdNm || "-";
    const cfg = getCfg(typeName);
    const grndFlr  = bld.grndFlrCnt;
    const ugrndFlr = bld.ugrndFlrCnt;

    wrap.innerHTML = `
      <div class="result-card" style="background:${cfg.bg};border-color:${cfg.border}">
        <div class="result-header">
          <div class="source-badge">✅ 공식 건축물대장</div>
        </div>
        <div class="result-main">
          <span style="font-size:52px">${cfg.icon}</span>
          <div>
            <p class="result-label" style="color:${cfg.text}">주용도</p>
            <h2 class="result-type" style="color:${cfg.text}">${typeName}</h2>
            ${bld.bldNm ? `<p class="result-bldnm">${bld.bldNm}</p>` : ""}
          </div>
        </div>
        <div class="details-grid">
          <div class="detail-item">
            <p class="detail-label">지상층수</p>
            <p class="detail-value">${grndFlr != null && grndFlr !== "" ? grndFlr + "층" : "-"}</p>
          </div>
          <div class="detail-item">
            <p class="detail-label">지하층수</p>
            <p class="detail-value">${ugrndFlr ? ugrndFlr + "층" : "-"}</p>
          </div>
          <div class="detail-item">
            <p class="detail-label">사용승인일</p>
            <p class="detail-value" style="font-size:13px">${fmtDate(bld.useAprDay)}</p>
          </div>
          <div class="detail-item">
            <p class="detail-label">세대수</p>
            <p class="detail-value">${bld.hhldCnt ? fmt(bld.hhldCnt) + "세대" : "-"}</p>
          </div>
          <div class="detail-item">
            <p class="detail-label">구조</p>
            <p class="detail-value" style="font-size:12px">${bld.strctCdNm || "-"}</p>
          </div>
          <div class="detail-item">
            <p class="detail-label">연면적</p>
            <p class="detail-value" style="font-size:12px">${bld.totArea ? fmt(Math.round(bld.totArea)) + "㎡" : "-"}</p>
          </div>
        </div>
        <div class="addr-info">
          <p class="addr-road">🏙️ ${params.roadAddr}</p>
          <p class="addr-jibun">📍 ${params.jibunAddr}</p>
        </div>
      </div>
    `;
  }

  function renderHistory() {
    if (searchHistory.length <= 1) return;
    const list = document.getElementById("historyList");
    list.innerHTML = "";
    searchHistory.slice(1).forEach(h => {
      const typeName = h.bld?.mainPurpsCdNm || "데이터 없음";
      const cfg = getCfg(typeName);
      const item = document.createElement("div");
      item.className = "history-item";
      item.innerHTML = `
        <span style="font-size:18px">${cfg.icon}</span>
        <span class="history-addr">${h.addr}</span>
        <span class="history-type" style="background:${cfg.bg};color:${cfg.text}">${typeName}</span>
      `;
      item.onclick = () => { document.getElementById("addressInput").value = h.addr; renderResult(h.bld, h.params); };
      list.appendChild(item);
    });
    document.getElementById("historySection").style.display = "block";
  }
</script>
</body>
</html>
